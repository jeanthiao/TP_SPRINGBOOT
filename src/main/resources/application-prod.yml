spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://prod-server:3306/gestion_commande}
    username: ${DB_USERNAME:prod_user}
    password: ${DB_PASSWORD:prod_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # ne modifie pas la base
    show-sql: false

server:
  port: ${SERVER_PORT:80}  # port HTTP classique
